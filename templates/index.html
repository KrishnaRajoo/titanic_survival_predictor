<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Titanic AI | Survival Prediction</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <script src="https://kit.fontawesome.com/6c63b3fd5d.js"
            crossorigin="anonymous"></script>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

</head>

<body>

<div class="background">

    <div class="stars"></div>

    <div class="stars2"></div>

    <div class="moon"></div>

    <div class="wave wave1"></div>

    <div class="wave wave2"></div>

    <div class="wave wave3"></div>

</div>

<div class="container">

<div class="glass-card">

<div class="hero">

<div class="ship-icon">

<i class="fa-solid fa-ship"></i>

</div>

<h1>Titanic Survival Predictor</h1>

<p>

Machine Learning Powered

<br>

Passenger Survival Prediction

</p>

</div>

<form action="/predict" method="POST">

<h2>

<i class="fa-solid fa-user"></i>

Passenger Information

</h2>

<div class="grid">

<div class="field">

<label>

<i class="fa-solid fa-crown"></i>

Passenger Class

</label>

<select name="Pclass" required>

<option value="">Choose...</option>

<option value="1">First Class</option>

<option value="2">Second Class</option>

<option value="3">Third Class</option>

</select>

</div>

<div class="field">

<label>

<i class="fa-solid fa-venus-mars"></i>

Gender

</label>

<select name="Sex" required>

<option value="">Choose...</option>

<option value="0">Male</option>

<option value="1">Female</option>

</select>

</div>

<div class="field">

<label>

<i class="fa-solid fa-cake-candles"></i>

Age

</label>

<input
type="number"
step="0.1"
name="Age"
placeholder="Enter age"
required>

</div>

<div class="field">

<label>

<i class="fa-solid fa-money-bill-wave"></i>

Fare

</label>

<input
type="number"
step="0.01"
name="Fare"
placeholder="Ticket fare"
required>

</div>

<div class="field">

<label>

<i class="fa-solid fa-people-group"></i>

Siblings / Spouse

</label>

<input
type="number"
name="SibSp"
min="0"
required>

</div>

<div class="field">

<label>

<i class="fa-solid fa-child"></i>

Parents / Children

</label>

<input
type="number"
name="Parch"
min="0"
required>

</div>

<div class="field full">

<label>

<i class="fa-solid fa-anchor"></i>

Embarked

</label>

<select name="Embarked" required>

<option value="">Choose Port</option>

<option value="0">Southampton</option>

<option value="1">Cherbourg</option>

<option value="2">Queenstown</option>

</select>

</div>

</div>

<button class="predict-btn">

<i class="fa-solid fa-brain"></i>

Predict Survival

</button>

</form>

{% if prediction_text %}

<div class="prediction-card">

    <h2>Prediction Result</h2>

    <p>{{ prediction_text }}</p>

    <h3>{{ confidence }}% Confident</h3>

</div>

{% endif %}

<div class="footer">

Created by Krishna Rajoo

<br>

Machine Learning • Flask • Scikit-Learn

</div>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
